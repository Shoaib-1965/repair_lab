name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # lets you trigger manually from GitHub website

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Get your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 - Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3 - Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # Step 4 - Get dependencies
      - name: Get dependencies
        run: flutter pub get

      # Step 5 - Generate Hive adapters
      - name: Generate code (Hive)
        run: dart run build_runner build --delete-conflicting-outputs

      # Step 6 - Build APK (split by CPU type = smaller files)
      - name: Build APK
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/debug-info

      # Step 7 - Upload APK so you can download it
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JTC-RepairLab-APK
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30